<svg xmlns="http://www.w3.org/2000/svg" width="840" height="160" viewBox="0 0 840 160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#f78166"/>
    </linearGradient>
    <style>
      @keyframes float1 { 0%,100% { transform: translateY(0); opacity: 0.3; } 50% { transform: translateY(-8px); opacity: 0.7; } }
      @keyframes float2 { 0%,100% { transform: translateY(0); opacity: 0.2; } 50% { transform: translateY(-12px); opacity: 0.5; } }
      @keyframes float3 { 0%,100% { transform: translateY(0); opacity: 0.15; } 50% { transform: translateY(-6px); opacity: 0.4; } }
      .dot1 { animation: float1 4s ease-in-out infinite; }
      .dot2 { animation: float2 5s ease-in-out infinite; }
      .dot3 { animation: float3 3.5s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="840" height="160" fill="url(#bg)" rx="6"/>
  <!-- floating dots -->
  <circle class="dot1" cx="120" cy="40" r="1.5" fill="#58a6ff" style="animation-delay: 0s"/>
  <circle class="dot2" cx="250" cy="70" r="1" fill="#a371f7" style="animation-delay: 0.8s"/>
  <circle class="dot3" cx="380" cy="30" r="1.2" fill="#f78166" style="animation-delay: 1.5s"/>
  <circle class="dot1" cx="500" cy="55" r="1" fill="#58a6ff" style="animation-delay: 2s"/>
  <circle class="dot2" cx="620" cy="35" r="1.5" fill="#a371f7" style="animation-delay: 0.5s"/>
  <circle class="dot3" cx="730" cy="65" r="1" fill="#3fb950" style="animation-delay: 1s"/>
  <circle class="dot1" cx="180" cy="90" r="1" fill="#f78166" style="animation-delay: 3s"/>
  <circle class="dot2" cx="460" cy="100" r="1.2" fill="#58a6ff" style="animation-delay: 1.8s"/>
  <circle class="dot3" cx="680" cy="95" r="1" fill="#a371f7" style="animation-delay: 2.5s"/>
  <circle class="dot1" cx="70" cy="110" r="1" fill="#3fb950" style="animation-delay: 0.3s"/>
  <circle class="dot2" cx="330" cy="115" r="1.5" fill="#f78166" style="animation-delay: 1.2s"/>
  <circle class="dot3" cx="780" cy="45" r="1" fill="#58a6ff" style="animation-delay: 2.2s"/>
  <!-- name -->
  <text x="420" y="72" text-anchor="middle" fill="#e6edf3" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="600">Darshankumar Joshi</text>
  <!-- tagline -->
  <text x="420" y="108" text-anchor="middle" fill="#8b949e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="400" letter-spacing="3">
    rust · agentic ai · web3
  </text>
  <!-- accent line -->
  <rect x="0" y="155" width="840" height="5" fill="url(#accent)" rx="0"/>
</svg>

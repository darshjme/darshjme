<svg xmlns="http://www.w3.org/2000/svg" width="840" height="200" viewBox="0 0 840 200">
  <defs>
    <style>
      .card { fill: #161b22; rx: 8; }
      .name { fill: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 600; }
      .desc { fill: #8b949e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; }
    </style>
  </defs>
  <rect width="840" height="200" fill="#0d1117" rx="6"/>

  <!-- Card 1: Mohini -->
  <rect class="card" x="16" y="16" width="396" height="76" rx="8"/>
  <rect x="16" y="16" width="4" height="76" fill="#58a6ff" rx="2"/>
  <text class="name" x="36" y="46">Mohini</text>
  <text class="desc" x="36" y="68">agent operating system · rust</text>

  <!-- Card 2: KnowAI ERP -->
  <rect class="card" x="428" y="16" width="396" height="76" rx="8"/>
  <rect x="428" y="16" width="4" height="76" fill="#3fb950" rx="2"/>
  <text class="name" x="448" y="46">KnowAI ERP</text>
  <text class="desc" x="448" y="68">enterprise platform · react + next.js</text>

  <!-- Card 3: MyCryptoCoin -->
  <rect class="card" x="16" y="108" width="396" height="76" rx="8"/>
  <rect x="16" y="108" width="4" height="76" fill="#f0a030" rx="2"/>
  <text class="name" x="36" y="138">MyCryptoCoin</text>
  <text class="desc" x="36" y="160">crypto payments · typescript</text>

  <!-- Card 4: WhatsApp 2FA -->
  <rect class="card" x="428" y="108" width="396" height="76" rx="8"/>
  <rect x="428" y="108" width="4" height="76" fill="#3fb950" rx="2"/>
  <text class="name" x="448" y="138">WhatsApp 2FA</text>
  <text class="desc" x="448" y="160">otp authentication · node.js</text>
</svg>
